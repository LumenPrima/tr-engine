<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TR-Engine Login</title>
<style>
:root {
  --bg-base: #0a0a0a;
  --bg-card: #111;
  --border: #333;
  --text: #e0e0e0;
  --text-dim: #888;
  --accent: #7af;
  --red: #f44;
  --mono: 'Courier New', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--mono);
  background: var(--bg-base);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 32px;
  width: 320px;
}
h1 {
  font-size: 14px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 24px;
  text-align: center;
}
.form-group {
  margin-bottom: 16px;
}
label {
  display: block;
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 6px;
}
input {
  width: 100%;
  padding: 10px 12px;
  background: #181818;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 14px;
}
input:focus {
  outline: none;
  border-color: var(--accent);
}
button {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
  margin-top: 8px;
}
button:hover {
  opacity: 0.9;
}
.error {
  background: rgba(255, 68, 68, 0.1);
  border: 1px solid var(--red);
  color: var(--red);
  padding: 10px;
  border-radius: 4px;
  font-size: 12px;
  margin-bottom: 16px;
  text-align: center;
}
</style>
</head>
<body>
<div class="login-box">
  <h1>TR-Engine</h1>
  {{if .Error}}
  <div class="error">{{.Error}}</div>
  {{end}}
  <form method="POST" action="/login">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" autocomplete="username" autofocus required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit">Login</button>
  </form>
</div>
</body>
</html>
