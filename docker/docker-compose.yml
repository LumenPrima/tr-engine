version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: tr-engine-postgres
    environment:
      POSTGRES_USER: tr_engine
      POSTGRES_PASSWORD: tr_engine_dev
      POSTGRES_DB: tr_engine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tr_engine -d tr_engine"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto:2
    container_name: tr-engine-mqtt
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt_data:/mosquitto/data
      - mqtt_log:/mosquitto/log
    ports:
      - "1883:1883"
      - "9001:9001"
    restart: unless-stopped

  tr-engine:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: tr-engine
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: tr_engine
      DB_USER: tr_engine
      DB_PASSWORD: tr_engine_dev
      MQTT_BROKER: tcp://mqtt:1883
      AUDIO_PATH: /data/audio
    volumes:
      - audio_data:/data/audio
      - ./config.yaml:/app/config/config.yaml:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mqtt:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  mqtt_data:
  mqtt_log:
  audio_data:
