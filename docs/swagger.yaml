basePath: /api/v1
definitions:
  database.TranscriptionQueueStats:
    properties:
      completed:
        type: integer
      failed:
        type: integer
      pending:
        type: integer
      processing:
        type: integer
    type: object
  ingest.RecorderInfo:
    properties:
      count:
        type: integer
      duration:
        type: number
      freq:
        type: integer
      rec_num:
        type: integer
      rec_state_type:
        type: string
      rec_type:
        type: string
      recorder_id:
        type: integer
      squelched:
        type: boolean
      src_num:
        type: integer
      state:
        type: integer
      tg_alpha_tag:
        type: string
      tgid:
        type: integer
      unit_alpha_tag:
        type: string
      unit_id:
        type: integer
    type: object
  models.Call:
    description: A recorded radio call/transmission
    properties:
      analog:
        example: false
        type: boolean
      audio_path:
        description: Audio
        example: butco/2024/01/15/1001-1705319400.m4a
        type: string
      audio_size:
        example: 45000
        type: integer
      audio_type:
        example: digital
        type: string
      audio_url:
        example: /api/v1/calls/123/audio
        type: string
      call_group_id:
        example: 1
        type: integer
      call_num:
        example: 12345
        type: integer
      call_state:
        description: Status
        example: 3
        type: integer
      conventional:
        example: false
        type: boolean
      duration:
        example: 45.5
        type: number
      emergency:
        example: false
        type: boolean
      encrypted:
        example: false
        type: boolean
      error_count:
        example: 2
        type: integer
      freq:
        description: Quality
        example: 851012500
        type: integer
      freq_error:
        example: 0
        type: integer
      id:
        example: 1
        type: integer
      instance_id:
        example: 1
        type: integer
      metadata_json:
        description: Metadata
        type: object
      mon_state:
        example: 0
        type: integer
      noise_db:
        example: -80
        type: number
      patched_tgids:
        description: Patches
        items:
          type: integer
        type: array
      phase2_tdma:
        example: false
        type: boolean
      recorder_id:
        example: 1
        type: integer
      signal_db:
        example: -45.5
        type: number
      spike_count:
        example: 0
        type: integer
      start_time:
        description: Timing
        example: "2024-01-15T10:30:00Z"
        type: string
      stop_time:
        example: "2024-01-15T10:30:45Z"
        type: string
      system_id:
        example: 1
        type: integer
      tdma_slot:
        example: 0
        type: integer
      tg_alpha_tag:
        example: 09-8L Main
        type: string
      tg_sysid:
        example: "348"
        type: string
      tgid:
        description: Joined fields (not stored in calls table)
        example: 9178
        type: integer
      tr_call_id:
        description: Identifiers
        example: butco-1001-1705319400
        type: string
      units:
        items:
          $ref: '#/definitions/models.CallUnit'
        type: array
    type: object
  models.CallUnit:
    properties:
      alpha_tag:
        example: 09 7COM3
        type: string
      unit_rid:
        example: 924003
        type: integer
    type: object
  models.System:
    description: A radio system (P25, SmartNet, conventional, etc.)
    properties:
      config_json:
        type: object
      id:
        example: 1
        type: integer
      instance_id:
        example: 1
        type: integer
      nac:
        example: "293"
        type: string
      rfss:
        example: 1
        type: integer
      short_name:
        example: butco
        type: string
      site_id:
        example: 1
        type: integer
      sys_num:
        example: 0
        type: integer
      sysid:
        example: "1234"
        type: string
      system_type:
        example: p25
        type: string
      wacn:
        example: BEE00
        type: string
    type: object
  models.Talkgroup:
    description: A talkgroup on a radio system, unique within a SYSID
    properties:
      alpha_tag:
        example: Fire Dispatch
        type: string
      description:
        example: County Fire Dispatch Channel
        type: string
      first_seen:
        example: "2024-01-01T00:00:00Z"
        type: string
      group:
        example: Fire
        type: string
      last_seen:
        example: "2024-01-15T12:30:00Z"
        type: string
      mode:
        example: D
        type: string
      priority:
        example: 1
        type: integer
      sysid:
        example: "348"
        type: string
      tag:
        example: Fire Dispatch
        type: string
      tgid:
        example: 1001
        type: integer
    type: object
  models.Transcription:
    description: A transcription of a radio call's audio content
    properties:
      call_duration:
        description: seconds, for word timeline rendering
        example: 15.5
        type: number
      call_id:
        example: 123
        type: integer
      confidence:
        example: 0.95
        type: number
      created_at:
        example: "2024-01-15T12:30:00Z"
        type: string
      duration_ms:
        example: 1500
        type: integer
      id:
        example: 1
        type: integer
      language:
        example: en
        type: string
      model:
        example: whisper-1
        type: string
      provider:
        example: openai
        type: string
      text:
        example: Engine 5 responding to the scene
        type: string
      word_count:
        example: 6
        type: integer
      words:
        items:
          $ref: '#/definitions/models.TranscriptionWord'
        type: array
    type: object
  models.TranscriptionWord:
    description: A word from the transcription with start and end times
    properties:
      end:
        description: seconds from start of audio
        example: 0.85
        type: number
      start:
        description: seconds from start of audio
        example: 0.5
        type: number
      word:
        example: Engine
        type: string
    type: object
  models.Unit:
    description: A radio unit (mobile or portable radio), unique within a SYSID
    properties:
      alpha_tag:
        example: Engine 1
        type: string
      alpha_tag_source:
        example: radioreference
        type: string
      first_seen:
        example: "2024-01-01T00:00:00Z"
        type: string
      last_event_tg_tag:
        example: 09-8L Main
        type: string
      last_event_tgid:
        example: 9178
        type: integer
      last_event_time:
        type: string
      last_event_type:
        description: Joined fields (not stored in units table)
        example: call
        type: string
      last_seen:
        example: "2024-01-15T12:30:00Z"
        type: string
      sysid:
        example: "348"
        type: string
      unit_id:
        example: 1234567
        type: integer
    type: object
  models.UnitEvent:
    description: A unit event such as registration, affiliation, or call activity
    properties:
      event_type:
        example: join
        type: string
      id:
        example: 1
        type: integer
      instance_id:
        example: 1
        type: integer
      metadata_json:
        type: object
      system_id:
        example: 1
        type: integer
      tg_sysid:
        example: "348"
        type: string
      tgid:
        example: 1001
        type: integer
      time:
        example: "2024-01-15T10:30:00Z"
        type: string
      unit_rid:
        example: 1234567
        type: integer
      unit_sysid:
        example: "348"
        type: string
    type: object
  rest.ActiveUnitListResponse:
    properties:
      count:
        example: 10
        type: integer
      limit:
        example: 50
        type: integer
      offset:
        example: 0
        type: integer
      units: {}
      window:
        example: 5
        type: integer
    type: object
  rest.ActivityResponse:
    properties:
      calls_24h:
        example: 5000
        type: integer
      system_activity: {}
      systems:
        example: 3
        type: integer
      talkgroups:
        example: 500
        type: integer
      units:
        example: 1000
        type: integer
    type: object
  rest.CallGroupDetailResponse:
    properties:
      call_group: {}
      calls: {}
    type: object
  rest.CallGroupListResponse:
    properties:
      call_groups: {}
      count:
        example: 50
        type: integer
      limit:
        example: 50
        type: integer
      offset:
        example: 0
        type: integer
    type: object
  rest.CallListResponse:
    properties:
      calls: {}
      count:
        example: 25
        type: integer
      limit:
        example: 50
        type: integer
      offset:
        example: 0
        type: integer
    type: object
  rest.ErrorResponse:
    properties:
      error:
        example: Resource not found
        type: string
    type: object
  rest.RatesResponse:
    properties:
      count:
        example: 100
        type: integer
      rates: {}
    type: object
  rest.RecorderListResponse:
    properties:
      count:
        example: 12
        type: integer
      recorders:
        items:
          $ref: '#/definitions/ingest.RecorderInfo'
        type: array
    type: object
  rest.SystemListResponse:
    properties:
      count:
        example: 5
        type: integer
      systems:
        items:
          $ref: '#/definitions/models.System'
        type: array
    type: object
  rest.TalkgroupListResponse:
    properties:
      count:
        example: 100
        type: integer
      limit:
        example: 50
        type: integer
      offset:
        example: 0
        type: integer
      talkgroups: {}
    type: object
  rest.TranscribeCallRequest:
    properties:
      priority:
        type: integer
    type: object
  rest.UnitEventListResponse:
    properties:
      count:
        example: 100
        type: integer
      events:
        items:
          $ref: '#/definitions/models.UnitEvent'
        type: array
      limit:
        example: 50
        type: integer
      offset:
        example: 0
        type: integer
    type: object
  rest.UnitListResponse:
    properties:
      count:
        example: 50
        type: integer
      limit:
        example: 50
        type: integer
      offset:
        example: 0
        type: integer
      units:
        items:
          $ref: '#/definitions/models.Unit'
        type: array
    type: object
host: localhost:8080
info:
  contact: {}
  description: Backend service for trunk-recorder data ingestion and querying. Provides
    REST APIs for accessing radio system data, calls, talkgroups, and units.
  title: tr-engine API
  version: 0.2.2-beta1
paths:
  /call-groups:
    get:
      description: Returns deduplicated call groups (calls from multiple recorders
        grouped together)
      parameters:
      - description: Start time filter (RFC3339)
        in: query
        name: start_time
        type: string
      - description: End time filter (RFC3339)
        in: query
        name: end_time
        type: string
      - default: 50
        description: Results per page
        in: query
        name: limit
        type: integer
      - default: 0
        description: Page offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.CallGroupListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: List call groups
      tags:
      - call-groups
  /call-groups/{id}:
    get:
      description: Returns a call group with all its individual call recordings
      parameters:
      - description: Call group ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.CallGroupDetailResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Get a call group
      tags:
      - call-groups
  /calls:
    get:
      description: Returns call recordings with optional filters
      parameters:
      - description: Filter by system ID
        in: query
        name: system
        type: integer
      - description: Filter by talkgroup ID
        in: query
        name: talkgroup
        type: integer
      - description: Start time filter (RFC3339)
        in: query
        name: start_time
        type: string
      - description: End time filter (RFC3339)
        in: query
        name: end_time
        type: string
      - default: 50
        description: Results per page
        in: query
        name: limit
        type: integer
      - default: 0
        description: Page offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.CallListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: List all calls
      tags:
      - calls
  /calls/{id}:
    get:
      description: Returns a single call by its trunk-recorder call ID
      parameters:
      - description: Trunk-recorder call ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Call'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Get a call
      tags:
      - calls
  /calls/{id}/audio:
    get:
      description: Streams the audio file for a call
      parameters:
      - description: Trunk-recorder call ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - audio/mpeg
      - audio/mp4
      - audio/wav
      - audio/ogg
      responses:
        "200":
          description: OK
          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Get call audio
      tags:
      - calls
  /calls/{id}/frequencies:
    get:
      description: Returns the list of frequency entries (freqList) within a call,
        ordered by position in the audio
      parameters:
      - description: Trunk-recorder call ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Response with frequencies array and count
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Get call frequencies
      tags:
      - calls
  /calls/{id}/transcribe:
    post:
      consumes:
      - application/json
      description: Queues a call for transcription (or re-transcription)
      parameters:
      - description: Call ID (tr_call_id or numeric ID)
        in: path
        name: id
        required: true
        type: string
      - description: Request body
        in: body
        name: body
        schema:
          $ref: '#/definitions/rest.TranscribeCallRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Queue call for transcription
      tags:
      - calls
  /calls/{id}/transcription:
    get:
      description: Returns the transcription for a specific call
      parameters:
      - description: Call ID (tr_call_id or numeric ID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Transcription'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Get call transcription
      tags:
      - calls
  /calls/{id}/transmissions:
    get:
      description: Returns the list of unit transmissions (srcList) within a call,
        ordered by position in the audio
      parameters:
      - description: Trunk-recorder call ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Response with transmissions array and count
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Get call transmissions
      tags:
      - calls
  /calls/active:
    get:
      description: Returns currently active calls (calls without a stop_time)
      parameters:
      - description: System ID or short_name
        in: query
        name: system
        type: string
      - description: System short name
        in: query
        name: sys_name
        type: string
      - description: Filter by talkgroup ID
        in: query
        name: talkgroup
        type: integer
      - description: Filter by emergency status
        in: query
        name: emergency
        type: boolean
      - description: Filter by encryption status
        in: query
        name: encrypted
        type: boolean
      - default: 50
        description: Results per page
        in: query
        name: limit
        type: integer
      - default: 0
        description: Page offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.CallListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: List active calls
      tags:
      - calls
  /calls/active/realtime:
    get:
      description: Returns currently active calls from in-memory tracker (real-time
        from MQTT)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get real-time active calls
      tags:
      - calls
  /calls/recent:
    get:
      description: Returns recently completed calls from database with full unit list
        and audio status
      parameters:
      - default: 50
        description: Number of calls to return
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get recently ended calls
      tags:
      - calls
  /recorders:
    get:
      description: Returns all known recorder states from in-memory cache (populated
        by MQTT recorder messages)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.RecorderListResponse'
      summary: List recorder states
      tags:
      - recorders
  /stats:
    get:
      description: Returns overall system statistics including counts and call metrics
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Get system statistics
      tags:
      - stats
  /stats/activity:
    get:
      description: Returns summary statistics and recent activity across all systems
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.ActivityResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Get activity summary
      tags:
      - stats
  /stats/rates:
    get:
      description: Returns system decode rate measurements over time
      parameters:
      - description: Start time filter (RFC3339)
        in: query
        name: start_time
        type: string
      - description: End time filter (RFC3339)
        in: query
        name: end_time
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.RatesResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Get decode rates
      tags:
      - stats
  /systems:
    get:
      description: Returns all registered radio systems
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.SystemListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: List all systems
      tags:
      - systems
  /systems/{id}:
    get:
      description: Returns a single system by ID
      parameters:
      - description: System ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.System'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Get a system
      tags:
      - systems
  /systems/{id}/talkgroups:
    get:
      description: Returns all talkgroups for a specific system
      parameters:
      - description: System ID
        in: path
        name: id
        required: true
        type: integer
      - default: 50
        description: Results per page
        in: query
        name: limit
        type: integer
      - default: 0
        description: Page offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.TalkgroupListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: List system talkgroups
      tags:
      - systems
  /talkgroups:
    get:
      description: Returns all talkgroups, optionally filtered by SYSID
      parameters:
      - description: Filter by SYSID (P25 system identifier)
        in: query
        name: sysid
        type: string
      - default: 50
        description: Results per page
        in: query
        name: limit
        type: integer
      - default: 0
        description: Page offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.TalkgroupListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: List all talkgroups
      tags:
      - talkgroups
  /talkgroups/{id}:
    get:
      description: Returns a single talkgroup. Accepts sysid:tgid format (e.g., "348:9178")
        or plain tgid (returns 409 if ambiguous)
      parameters:
      - description: Talkgroup ID (sysid:tgid or plain tgid)
        in: path
